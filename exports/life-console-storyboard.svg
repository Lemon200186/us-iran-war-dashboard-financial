<svg width="1800" height="1280" viewBox="0 0 1800 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5ECDD"/>
      <stop offset="1" stop-color="#E4D2B8"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B1E22"/>
      <stop offset="1" stop-color="#0E1012"/>
    </linearGradient>
    <linearGradient id="screenWarm" x1="0" y1="0" x2="0" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF4E9"/>
      <stop offset="1" stop-color="#F1E2CC"/>
    </linearGradient>
    <linearGradient id="screenCool" x1="0" y1="0" x2="0" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F0E6"/>
      <stop offset="1" stop-color="#E8D9C5"/>
    </linearGradient>
    <linearGradient id="screenReview" x1="0" y1="0" x2="0" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF2E7"/>
      <stop offset="1" stop-color="#ECDDCA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#2B241D" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 700 72px Baskerville, Georgia, serif; fill: #182535; }
      .sub { font: 500 22px 'Avenir Next', Helvetica, Arial, sans-serif; fill: #6A7687; }
      .eyebrow { font: 600 14px 'Avenir Next', Helvetica, Arial, sans-serif; letter-spacing: 5px; text-transform: uppercase; fill: #B68C3C; }
      .phoneTitle { font: 700 30px Baskerville, Georgia, serif; fill: #182535; }
      .section { font: 600 12px 'Avenir Next', Helvetica, Arial, sans-serif; letter-spacing: 2px; text-transform: uppercase; fill: #687587; }
      .body { font: 500 14px 'Avenir Next', Helvetica, Arial, sans-serif; fill: #657182; }
      .strong { font: 700 17px 'Avenir Next', Helvetica, Arial, sans-serif; fill: #162231; }
      .chip { font: 700 11px 'Avenir Next', Helvetica, Arial, sans-serif; letter-spacing: 1.5px; text-transform: uppercase; }
      .btn { font: 700 14px 'Avenir Next', Helvetica, Arial, sans-serif; }
      .small { font: 600 11px 'Avenir Next', Helvetica, Arial, sans-serif; letter-spacing: 1.2px; text-transform: uppercase; fill: #758090; }
    </style>
  </defs>

  <rect width="1800" height="1280" fill="url(#bg)"/>
  <circle cx="180" cy="90" r="220" fill="#B68C3C" fill-opacity="0.12"/>
  <circle cx="1620" cy="180" r="240" fill="#2A4057" fill-opacity="0.10"/>

  <text x="100" y="90" class="eyebrow">LIFE CONSOLE IOS PROTOTYPE</text>
  <text x="100" y="170" class="title">Core Prototype Storyboard</text>
  <text x="100" y="220" class="sub">Today / Coach / Journal / Progress in one direct view, without needing to open the HTML prototype.</text>

  <!-- Phone 1 -->
  <g transform="translate(90,290)" filter="url(#shadow)">
    <rect width="360" height="940" rx="42" fill="url(#phone)"/>
    <rect x="14" y="48" width="332" height="870" rx="30" fill="url(#screenWarm)"/>
    <text x="40" y="95" class="section">Dual-Line Control</text>
    <text x="40" y="130" class="phoneTitle">Today</text>
    <circle cx="280" cy="108" r="42" fill="#324A63"/>
    <text x="264" y="103" class="chip" fill="#FFF9F1">82</text>
    <text x="250" y="122" class="chip" fill="#FFF9F1">CONTROL</text>

    <rect x="34" y="154" width="292" height="76" rx="22" fill="#FBF6EE" stroke="#FFFFFF"/>
    <text x="52" y="183" class="strong">Today's line</text>
    <text x="52" y="208" class="body">Protect sleep. Ship one visible output.</text>

    <rect x="34" y="248" width="292" height="212" rx="24" fill="#ECF3FB" stroke="#FFFFFF"/>
    <text x="52" y="278" class="section">Push Today</text>
    <text x="52" y="308" class="phoneTitle" style="font-size:25px">Ship onboarding state 1</text>
    <text x="52" y="336" class="body">Proof: one screen + three labeled states.</text>
    <text x="52" y="382" class="small">Risk</text>
    <text x="52" y="405" class="strong">Planning drift</text>
    <text x="208" y="382" class="small">Deadline</text>
    <text x="208" y="405" class="strong">21:30</text>
    <rect x="52" y="423" width="112" height="42" rx="16" fill="#2D445B"/>
    <text x="86" y="449" class="btn" fill="#FFF8F0">Start</text>
    <rect x="176" y="423" width="130" height="42" rx="16" fill="#FFFFFF" stroke="#D7DDE4"/>
    <text x="212" y="449" class="btn" fill="#162231">Log proof</text>

    <rect x="34" y="478" width="292" height="156" rx="24" fill="#FBF1E8" stroke="#FFFFFF"/>
    <text x="52" y="508" class="section">Protect Today</text>
    <text x="52" y="534" class="phoneTitle" style="font-size:23px">Protect the sleep</text>
    <text x="52" y="560" class="phoneTitle" style="font-size:23px">boundary</text>
    <text x="52" y="586" class="body">Wind-down starts at 22:15.</text>
    <rect x="52" y="602" width="132" height="40" rx="16" fill="#7B3427"/>
    <text x="84" y="627" class="btn" fill="#FFF8F0">Start routine</text>

    <rect x="34" y="650" width="140" height="140" rx="22" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="52" y="680" class="section">Hard</text>
    <text x="52" y="714" class="body">Podcast 20 min</text>
    <text x="52" y="740" class="body">Read 1 chapter</text>
    <text x="52" y="766" class="body">Paper journal</text>

    <rect x="186" y="650" width="140" height="140" rx="22" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="204" y="680" class="section">Soft</text>
    <text x="204" y="714" class="body">Exercise done</text>
    <text x="204" y="740" class="body">French pending</text>
    <text x="204" y="766" class="body">App journal PM</text>

    <rect x="34" y="820" width="292" height="70" rx="18" fill="#FFF9F1" stroke="#FFFFFF"/>
    <text x="58" y="862" class="chip" fill="#2D445B">TODAY  COACH  JOURNAL  PROGRESS</text>
  </g>

  <!-- Phone 2 -->
  <g transform="translate(500,290)" filter="url(#shadow)">
    <rect width="360" height="940" rx="42" fill="url(#phone)"/>
    <rect x="14" y="48" width="332" height="870" rx="30" fill="url(#screenCool)"/>
    <text x="40" y="95" class="section">AI Action Console</text>
    <text x="40" y="130" class="phoneTitle">Coach</text>
    <rect x="256" y="78" width="64" height="52" rx="16" fill="#FFF8F0" stroke="#FFFFFF"/>
    <text x="272" y="100" class="chip" fill="#162231">LIVE</text>
    <text x="267" y="118" class="chip" fill="#6A7687">PRIORITY</text>

    <rect x="34" y="154" width="292" height="236" rx="24" fill="#E9F1FA" stroke="#FFFFFF"/>
    <text x="52" y="184" class="section">Project Move</text>
    <text x="52" y="216" class="phoneTitle" style="font-size:24px">Ship onboarding state 1</text>
    <text x="52" y="244" class="body">Fastest move for today's side-project result.</text>
    <text x="52" y="290" class="small">Risk</text>
    <text x="52" y="313" class="strong">Planning drift</text>
    <text x="210" y="290" class="small">Window</text>
    <text x="210" y="313" class="strong">Now to 21:30</text>
    <rect x="52" y="332" width="124" height="42" rx="16" fill="#2D445B"/>
    <text x="83" y="358" class="btn" fill="#FFF8F0">Start Now</text>
    <rect x="188" y="332" width="118" height="42" rx="16" fill="#FFFFFF" stroke="#D7DDE4"/>
    <text x="220" y="358" class="btn" fill="#162231">Why this</text>
    <rect x="52" y="386" width="254" height="42" rx="16" fill="#FFFFFF" stroke="#D7DDE4"/>
    <text x="129" y="412" class="btn" fill="#162231">Take over</text>

    <rect x="34" y="408" width="140" height="118" rx="22" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="52" y="438" class="section">Floor Action</text>
    <text x="52" y="470" class="strong">Protect sleep</text>
    <text x="52" y="500" class="body">Status: at risk</text>

    <rect x="186" y="408" width="140" height="118" rx="22" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="204" y="438" class="section">Today Record</text>
    <text x="204" y="470" class="strong">Mission not started</text>
    <text x="204" y="498" class="body">Exercise done</text>

    <rect x="34" y="544" width="292" height="118" rx="22" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="52" y="574" class="section">AI Judgement</text>
    <text x="52" y="604" class="body">Task size is slightly too large.</text>
    <text x="52" y="628" class="body">Best move is still to ship one state.</text>

    <rect x="34" y="680" width="292" height="126" rx="22" fill="#EAF1F8" stroke="#FFFFFF"/>
    <text x="52" y="710" class="section">Take Over Today</text>
    <text x="52" y="742" class="strong">You should enter takeover now.</text>
    <rect x="52" y="760" width="144" height="40" rx="16" fill="#324A63"/>
    <text x="81" y="785" class="btn" fill="#FFF8F0">Enter takeover</text>

    <rect x="34" y="820" width="292" height="70" rx="18" fill="#FFF9F1" stroke="#FFFFFF"/>
    <text x="58" y="862" class="chip" fill="#2D445B">TODAY  COACH  JOURNAL  PROGRESS</text>
  </g>

  <!-- Phone 3 -->
  <g transform="translate(910,290)" filter="url(#shadow)">
    <rect width="360" height="940" rx="42" fill="url(#phone)"/>
    <rect x="14" y="48" width="332" height="870" rx="30" fill="url(#screenWarm)"/>
    <text x="40" y="95" class="section">Emotional Release</text>
    <text x="40" y="130" class="phoneTitle">Journal</text>
    <rect x="252" y="78" width="72" height="52" rx="16" fill="#F8ECE5" stroke="#FFFFFF"/>
    <text x="268" y="100" class="chip" fill="#7B3427">DAILY</text>
    <text x="273" y="118" class="chip" fill="#8F675F">ACTIVE</text>

    <rect x="34" y="154" width="292" height="332" rx="24" fill="#FBF4EC" stroke="#FFFFFF"/>
    <text x="52" y="184" class="section">In-App Journal</text>
    <text x="52" y="214" class="body">What blocked execution today most?</text>
    <text x="52" y="234" class="body">Task size, energy, emotion, or avoidance?</text>
    <rect x="52" y="242" width="82" height="34" rx="14" fill="#FFFFFF" stroke="#D7DDE4"/>
    <text x="71" y="264" class="btn" fill="#162231" style="font-size:12px">Task size</text>
    <rect x="144" y="242" width="84" height="34" rx="14" fill="#7B3427"/>
    <text x="164" y="264" class="btn" fill="#FFF8F0" style="font-size:12px">Avoidance</text>
    <rect x="238" y="242" width="68" height="34" rx="14" fill="#FFFFFF" stroke="#D7DDE4"/>
    <text x="251" y="264" class="btn" fill="#162231" style="font-size:12px">Low energy</text>
    <rect x="52" y="292" width="254" height="124" rx="18" fill="#FFFDF8" stroke="#D7DDE4"/>
    <text x="66" y="320" class="body">I stayed near the work, not inside it.</text>
    <text x="66" y="344" class="body">I prepared instead of shipping.</text>
    <text x="66" y="368" class="body">The task needed shrinking before lunch.</text>
    <rect x="52" y="436" width="122" height="42" rx="16" fill="#2D445B"/>
    <text x="80" y="462" class="btn" fill="#FFF8F0">Save Journal</text>
    <rect x="186" y="436" width="120" height="42" rx="16" fill="#FFFFFF" stroke="#D7DDE4"/>
    <text x="220" y="462" class="btn" fill="#162231">Quick mode</text>

    <rect x="34" y="504" width="292" height="148" rx="24" fill="#F7EEE5" stroke="#FFFFFF"/>
    <text x="52" y="534" class="section">Paper Journal Check</text>
    <text x="52" y="562" class="body">Tomorrow is a paper-journal day.</text>
    <text x="52" y="586" class="body">The app will remind and log completion.</text>
    <text x="52" y="610" class="small">Last completion</text>
    <text x="52" y="634" class="strong">Apr 1 · 23:04</text>

    <rect x="34" y="670" width="292" height="120" rx="24" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="52" y="700" class="section">Recent Pattern</text>
    <text x="52" y="730" class="body">Avoidance spikes when the mission stays vague after 20:00.</text>

    <rect x="34" y="820" width="292" height="70" rx="18" fill="#FFF9F1" stroke="#FFFFFF"/>
    <text x="58" y="862" class="chip" fill="#2D445B">TODAY  COACH  JOURNAL  PROGRESS</text>
  </g>

  <!-- Phone 4 -->
  <g transform="translate(1320,290)" filter="url(#shadow)">
    <rect width="360" height="940" rx="42" fill="url(#phone)"/>
    <rect x="14" y="48" width="332" height="870" rx="30" fill="url(#screenReview)"/>
    <text x="40" y="95" class="section">Outcome Before Vanity</text>
    <text x="40" y="130" class="phoneTitle">Progress</text>
    <rect x="246" y="78" width="78" height="52" rx="16" fill="#263B50"/>
    <text x="265" y="100" class="chip" fill="#FFF8F0">WEEK 14</text>
    <text x="278" y="118" class="chip" fill="#DCE4EC">LIVE</text>

    <rect x="34" y="154" width="140" height="118" rx="22" fill="#EAF1F8" stroke="#FFFFFF"/>
    <text x="52" y="182" class="small">Visible Output Days</text>
    <text x="52" y="220" class="phoneTitle" style="font-size:30px">4 / 7</text>
    <text x="52" y="250" class="body">Yellow zone</text>

    <rect x="186" y="154" width="140" height="118" rx="22" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="204" y="182" class="small">Foundation Score</text>
    <text x="204" y="220" class="phoneTitle" style="font-size:30px">78</text>
    <text x="204" y="250" class="body">Core weighted</text>

    <rect x="34" y="286" width="140" height="118" rx="22" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="52" y="314" class="small">Execution Funnel</text>
    <text x="52" y="352" class="phoneTitle" style="font-size:30px">71</text>
    <text x="52" y="382" class="body">Reminder to output</text>

    <rect x="186" y="286" width="140" height="118" rx="22" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="204" y="314" class="small">Main-line Alignment</text>
    <text x="204" y="352" class="phoneTitle" style="font-size:30px">67%</text>
    <text x="204" y="382" class="body">Needs correction</text>

    <rect x="34" y="422" width="292" height="186" rx="24" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="52" y="452" class="section">Weekly Trend</text>
    <rect x="70" y="516" width="42" height="58" rx="12" fill="#9EB1C6"/>
    <rect x="124" y="492" width="42" height="82" rx="12" fill="#7A93AD"/>
    <rect x="178" y="468" width="42" height="106" rx="12" fill="#526D87"/>
    <rect x="232" y="504" width="42" height="70" rx="12" fill="#6F879D"/>
    <text x="78" y="592" class="small">W11</text>
    <text x="132" y="592" class="small">W12</text>
    <text x="186" y="592" class="small">W13</text>
    <text x="240" y="592" class="small">W14</text>

    <rect x="34" y="626" width="292" height="164" rx="24" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="52" y="656" class="section">AI Insight</text>
    <text x="52" y="690" class="body">The strongest support habit for side-project output</text>
    <text x="52" y="714" class="body">is reading plus earlier wind-down discipline.</text>

    <rect x="34" y="820" width="292" height="70" rx="18" fill="#FFF9F1" stroke="#FFFFFF"/>
    <text x="58" y="862" class="chip" fill="#2D445B">TODAY  COACH  JOURNAL  PROGRESS</text>
  </g>
</svg>
