<svg width="900" height="1500" viewBox="0 0 900 1500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="1500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6EBDD"/>
      <stop offset="1" stop-color="#E7D5BB"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#191C20"/>
      <stop offset="1" stop-color="#0E1012"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF3E8"/>
      <stop offset="1" stop-color="#ECE0CB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#2A231D" flood-opacity="0.24"/>
    </filter>
    <style>
      .eyebrow { font: 600 16px 'Avenir Next', Helvetica, Arial, sans-serif; letter-spacing: 4px; text-transform: uppercase; fill: #B88C3A; }
      .title { font: 700 62px Baskerville, Georgia, serif; fill: #172433; }
      .sub { font: 500 22px 'Avenir Next', Helvetica, Arial, sans-serif; fill: #667486; }
      .screenTitle { font: 700 38px Baskerville, Georgia, serif; fill: #172433; }
      .section { font: 600 13px 'Avenir Next', Helvetica, Arial, sans-serif; letter-spacing: 2px; text-transform: uppercase; fill: #6A7687; }
      .strong { font: 700 21px 'Avenir Next', Helvetica, Arial, sans-serif; fill: #172433; }
      .body { font: 500 18px 'Avenir Next', Helvetica, Arial, sans-serif; fill: #687587; }
      .small { font: 600 12px 'Avenir Next', Helvetica, Arial, sans-serif; letter-spacing: 1.2px; text-transform: uppercase; fill: #7A8594; }
      .btn { font: 700 20px 'Avenir Next', Helvetica, Arial, sans-serif; }
    </style>
  </defs>
  <rect width="900" height="1500" fill="url(#bg)"/>
  <text x="90" y="96" class="eyebrow">Life Console Screen</text>
  <text x="90" y="166" class="title">Progress</text>
  <g transform="translate(180,260)" filter="url(#shadow)">
    <rect width="540" height="1160" rx="56" fill="url(#phone)"/>
    <rect x="20" y="58" width="500" height="1078" rx="38" fill="url(#screen)"/>
    <text x="58" y="120" class="section">Outcome Before Vanity</text>
    <text x="58" y="166" class="screenTitle">Progress</text>
    <rect x="382" y="96" width="90" height="56" rx="18" fill="#263B50"/>
    <text x="404" y="120" class="small" fill="#FFF8F0">WEEK 14</text>
    <text x="414" y="144" class="small" fill="#DCE4EC">LIVE</text>

    <rect x="48" y="196" width="208" height="152" rx="24" fill="#EAF1F8" stroke="#FFFFFF"/>
    <text x="72" y="232" class="small">Visible Output Days</text>
    <text x="72" y="284" class="screenTitle" style="font-size:34px">4 / 7</text>
    <text x="72" y="320" class="body">Yellow zone</text>

    <rect x="284" y="196" width="208" height="152" rx="24" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="308" y="232" class="small">Foundation Score</text>
    <text x="308" y="284" class="screenTitle" style="font-size:34px">78</text>
    <text x="308" y="320" class="body">Core weighted</text>

    <rect x="48" y="366" width="208" height="152" rx="24" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="72" y="402" class="small">Execution Funnel</text>
    <text x="72" y="454" class="screenTitle" style="font-size:34px">71</text>
    <text x="72" y="490" class="body">Reminder to output</text>

    <rect x="284" y="366" width="208" height="152" rx="24" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="308" y="402" class="small">Main-line Alignment</text>
    <text x="308" y="454" class="screenTitle" style="font-size:34px">67%</text>
    <text x="308" y="490" class="body">Needs correction</text>

    <rect x="48" y="544" width="444" height="236" rx="28" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="72" y="580" class="section">Weekly Trend</text>
    <rect x="106" y="674" width="48" height="68" rx="14" fill="#9EB1C6"/>
    <rect x="190" y="646" width="48" height="96" rx="14" fill="#7A93AD"/>
    <rect x="274" y="618" width="48" height="124" rx="14" fill="#526D87"/>
    <rect x="358" y="660" width="48" height="82" rx="14" fill="#6F879D"/>
    <text x="114" y="764" class="small">W11</text>
    <text x="198" y="764" class="small">W12</text>
    <text x="282" y="764" class="small">W13</text>
    <text x="366" y="764" class="small">W14</text>

    <rect x="48" y="806" width="444" height="180" rx="28" fill="#FBF7F0" stroke="#FFFFFF"/>
    <text x="72" y="842" class="section">AI Insight</text>
    <text x="72" y="884" class="body">The strongest support for side-project output</text>
    <text x="72" y="916" class="body">is reading plus earlier wind-down discipline.</text>

    <rect x="48" y="1052" width="444" height="64" rx="18" fill="#FFF9F1" stroke="#FFFFFF"/>
    <text x="102" y="1092" class="small" fill="#2D445B">TODAY   COACH   JOURNAL   PROGRESS</text>
  </g>
</svg>
